<!DOCTYPE html>
<html lang="en">
<head>
    <title>HTML 연습</title>
</head>
<body>
    <!--제목 태그-->
    <h1>HTML 연습</h1>

    <!--글 태그-->
    <p>이 페이지는 HTML . 기본 태그를 연습하는 예시입니다 </p>
    <br/><br/>

    <!-- --> 링크 태그
    <a href="https://google.com">구글로 이동</a>
    <br/><br/>

    <!-- --> 이미지 태그
    <img src="https://via.placeholder.com/150"alt=" " 예시 이미지 />
    <br/><br/>

    <!-- --> 리스트 태그
    <h3>좋아하는 동물</h3>
    <ul>
            <li>카피바라</li>
            <li>쿼카</li>
            <li>토끼</li>
</ul>
<br/>

<!-- div ( ) --> 구역 나누기
<div>
    
    <h3>로그인</h3>

    <!-- --> 입력창
    <p>아이디:</p>
    <input type="text"/>
    <br/><br/>

    <p>비밀번호:</p>
    <input type="password"/>
    <br/><br/>

    <!-- --> 버튼
    <button>로그인</button>
   </div>
  </body>
</html>
